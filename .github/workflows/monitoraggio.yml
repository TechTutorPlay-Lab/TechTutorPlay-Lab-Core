name: TechTutorPlay Cloud Monitor

on:
  schedule:
    - cron: '*/30 * * * *' # Ogni 30 minuti
  workflow_dispatch:      # Permette l'avvio manuale

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installazione Dipendenze
        run: |
          pip install requests pymongo datadog python-dotenv dnspython

      - name: Esecuzione Script
        env:
          # Collega i Secrets impostati su GitHub
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: "us5.datadoghq.com"
        # Puntiamo alla cartella src
        run: python src/New_Check_Websites.py
