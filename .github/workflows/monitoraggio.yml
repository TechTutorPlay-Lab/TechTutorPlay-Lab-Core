name: TechTutorPlay Cloud Monitor

on:
  schedule:
    - cron: '*/30 * * * *' # Gira ogni 30 minuti
  workflow_dispatch:      # Ti permette di avviarlo a mano con il tasto

jobs:
  run-monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa Dipendenze
        run: |
          pip install requests pymongo datadog python-dotenv dnspython

      - name: Esecuzione Script
        env:
          # Qui colleghiamo i Secrets di GitHub alle variabili dello script
          MONGODB_URI: ${{ secrets.MONGODB_URI }}
          DD_API_KEY: ${{ secrets.DD_API_KEY }}
          DD_SITE: "us5.datadoghq.com"
        # Entriamo nella cartella src per lanciare lo script
        run: python src/New_Check_Websites.py
